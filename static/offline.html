<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Offline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
      color: #a14a6b;
      text-align: center;
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .cookie {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      background: #f7c59f;
      border-radius: 50%;
      box-shadow: 0 4px 16px rgba(161,74,107,0.15);
      position: relative;
      border: 4px solid #fff0f5;
    }
    .chip {
      width: 18px;
      height: 18px;
      background: #a14a6b;
      border-radius: 50%;
      position: absolute;
      box-shadow: 0 2px 4px rgba(161,74,107,0.15);
    }
    .chip1 { top: 30px; left: 25px; }
    .chip2 { top: 60px; left: 70px; }
    .chip3 { top: 80px; left: 40px; }
    .chip4 { top: 50px; left: 90px; }
    .chip5 { top: 20px; left: 70px; }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      font-weight: bold;
      color: #a14a6b;
      text-shadow: 0 2px 8px #fff0f5;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      color: #a14a6b;
    }
    .brand {
      font-size: 1rem;
      color: #a14a6b;
      opacity: 0.7;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="cookie">
    <div class="chip chip1"></div>
    <div class="chip chip2"></div>
    <div class="chip chip3"></div>
    <div class="chip chip4"></div>
    <div class="chip chip5"></div>
  </div>
  <h1>You’re Offline</h1>
  <p>Looks like you lost connection.<br>Come back soon for more sweet treats!</p>
  <div class="brand">Amy Bakes &mdash;  Authentic Baking</div>
</body>
</html>
